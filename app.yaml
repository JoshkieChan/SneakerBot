name: ghost-sniper
region: nyc
services:
  - name: sniper-engine
    image:
      deploy_on_push: true
      dockerfile_path: Dockerfile
    # This is a worker, so it doesn't need to listen on a port
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: DISCORD_CHANNEL_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_SHEETS_ID
        scope: RUN_TIME
        type: SECRET
      - key: BEHAVIORAL_STEALTH
        value: "true"
      - key: PRE_DROP_SCOUTING
        value: "true"
