services:
  ghost-sniper:
    build: .
    container_name: ghost-sniper
    restart: always
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./config/config.json:/app/config/config.json
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
