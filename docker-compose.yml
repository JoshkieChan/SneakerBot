services:
  validator:
    container_name: sneakerbot-validator
    build: ./validator
    env_file: 
    - .env
    restart: always

  bot:
    container_name: sneakerbot-bot
    build: ./bot
    depends_on:
      - validator
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: 
    - .env
    environment:
      - NODE_ENV=production
    restart: always
