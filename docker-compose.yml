version: '3.8'

services:
  validator:
    build: ./validator
    container_name: validator
    ports:
      - "8000:8000"
    restart: always

  bot:
    build: ./bot
    container_name: bot
    depends_on:
      - validator
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    restart: always
