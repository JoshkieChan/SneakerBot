apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sniper-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-sniper
  labels:
    app: ghost-sniper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-sniper
  template:
    metadata:
      labels:
        app: ghost-sniper
    spec:
      containers:
      - name: sniper
        # NOTE: For DigitalOcean, replace 'YOUR_REGISTRY' with your DOCR name
        image: registry.digitalocean.com/YOUR_REGISTRY/ghost-sniper:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi" # Increased for Puppeteer stability
          requests:
            cpu: "250m"
            memory: "512Mi"
        envFrom:
        - secretRef:
            name: sniper-env
        volumeMounts:
        - name: agent-data
          mountPath: /app/agent/rules
      volumes:
      - name: agent-data
        persistentVolumeClaim:
          claimName: sniper-data-pvc
---
apiVersion: v1
kind: Secret
metadata:
  name: sniper-env
type: Opaque
stringData:
  # Fill these in your local .env before deploying, or use 'kubectl create secret'
  DISCORD_BOT_TOKEN: "YOUR_DISCORD_BOT_TOKEN"
  DISCORD_CLIENT_ID: "YOUR_DISCORD_CLIENT_ID"
  DISCORD_SERVER_ID: "YOUR_DISCORD_SERVER_ID"
  DISCORD_CHANNEL_ID: "YOUR_DISCORD_CHANNEL_ID"
  GOOGLE_SHEETS_ID: "YOUR_GOOGLE_SHEETS_ID"
  GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"
